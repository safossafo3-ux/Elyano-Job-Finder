[deploy]
# No healthcheckPath — let Railway use the default TCP check (is PORT open?).
# HTTP healthchecks were intermittently failing on Railway due to slow
# Playwright/Chromium cold start, causing 502 with x-railway-fallback: true.
startCommand = "python run.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
